name: Python Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 mypy

      - name: Run flake8
        run: |
          flake8 conversion/ tools/ scripts/ --max-line-length=125 --show-source --statistics

      - name: Run mypy
        run: |
          mypy conversion/ tools/ --ignore-missing-imports --show-error-codes
